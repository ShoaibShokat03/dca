name: dca
description: DCA Coaching Academy - Student Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Networking
  http: ^1.2.0

  # State management
  provider: ^6.1.1

  # Local storage (token, user data)
  shared_preferences: ^2.2.2

  # Video playback (supports HLS on iOS/Android natively)
  video_player: ^2.8.2
  chewie: ^1.7.4

  # Date formatting
  intl: ^0.19.0

  # URL launching (for external links)
  url_launcher: ^6.2.4

dev_dependencies:
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
